# IGE-123016 - Tiago Pires
name: "Qodana - Long Parameter List (ParametersPerMethod)"

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  qodana:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Run Qodana Analysis
        uses: JetBrains/qodana-action@v2024.3
        with:
          args: --config,.github/qodana-123016.yaml
        env:
          QODANA_TOKEN: ${{ secrets.QODANA_TOKEN }}
