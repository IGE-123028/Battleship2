# IGE-123016 - Tiago Pires
name: "Qodana - Complete Code Smells Analysis"

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

jobs:
  qodana:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      checks: write

    steps:
      - uses: actions/checkout@v3
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: 'Complete Qodana Scan'
        uses: JetBrains/qodana-action@v2024.3
        with:
          args: --profile-path,.qodana/profiles/qodana-123016.yml
          pr-mode: false
        env:
          QODANA_TOKEN: ${{ secrets.QODANA_TOKEN }}
          QODANA_ENDPOINT: 'https://qodana.cloud'