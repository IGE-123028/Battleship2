# IGE-123016 - Tiago Pires
name: "Qodana - Complete Code Smells Analysis"

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

jobs:
  qodana:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      checks: write

    steps:
      - uses: actions/checkout@v3
        with:
          # Using the head SHA is good for PRs, but for push events,
          # just checking out the branch is safer.
          fetch-depth: 0

      - name: 'Qodana'
        uses: JetBrains/qodana-action@v2024.3
        with:
          # Explicitly pointing to your custom profile
          args: --profile-name,qodana.recommended
          # Setting cache to true speeds up subsequent runs
          use-caches: true
        env:
          QODANA_TOKEN: ${{ secrets.QODANA_TOKEN }}