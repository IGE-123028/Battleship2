# Manuel Albuquerque IGE-123010
name: "Qodana - Overly Complex Method"

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

jobs:
  qodana:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      checks: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0

      - name: 'Qodana Scan - Overly Complex Method'
        uses: JetBrains/qodana-action@v2024.3
        with:
          args: --profile-path, .qodana/profiles/qodana-123010.yml --fail-threshold 0
          pr-mode: false
        env:
          QODANA_TOKEN: ${{ secrets.QODANA_TOKEN_1695558519 }}
          QODANA_ENDPOINT: 'https://qodana.cloud'
