# Manuel Albuquerque IGE-123010
name: "Overly Complex Method - Qodana Quality Gate"

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  qodana:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      checks: write
      pull-requests: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 'Qodana Scan'
        uses: JetBrains/qodana-action@v2025.3
        env:
          QODANA_TOKEN: ${{ secrets.QODANA_TOKEN }}
        with:
          args: --fail-threshold 0
          pr-mode: true
          post-pr-comment: true
          github-token: ${{ secrets.GITHUB_TOKEN }}
