version: "1.0"
# IGE-123016
# Custom profile to Long Parameter List
# Based on "Object-Oriented Metrics in Practice" (Lanza & Marinescu)
profile:
  base:
    name: empty

  inspections:
    - inspection: ParametersPerMethod
      options:
        m_limit: 3
    - inspection: ParametersPerConstructor
      options:
        m_limit: 3