version: "1.0"
# Custom profile to Long Parameter List
# Based on "Object-Oriented Metrics in Practice" (Lanza & Marinescu)
# IGE-123016 - Tiago Pires
linter: jetbrains/qodana-jvm:latest
profile:
  name: qodana.recommended
  inspections:
    - id: ParametersPerConstructor
      enabled: true
      properties:
        limit: 4
    - id: ParametersPerMethod
      enabled: true
      properties:
        limit: 4