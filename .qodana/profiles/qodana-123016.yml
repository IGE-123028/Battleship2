version: "1.0"

# Custom profile to Long Parameter List
# Based on "Object-Oriented Metrics in Practice" (Lanza & Marinescu)
# IGE-123016 - Tiago Pires
profile:
    name: empty

include:
  - name: ParametersPerMethod
    options:
      m_limit: 5
    enabled: true

  - name: ParametersPerConstructor
    options:
      m_limit: 5
    enabled: true